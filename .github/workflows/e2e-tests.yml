name: E2E Tests

permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

concurrency:
  group: e2e-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      affected: ${{ steps.detect.outputs.affected }}
      has_affected: ${{ steps.detect.outputs.has_affected }}
      has_affected_sources: ${{ steps.detect.outputs.has_affected_sources }}
      has_affected_connections: ${{ steps.detect.outputs.has_affected_connections }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect affected integrations
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")

          # Core files that trigger ALL tests
          CORE_PATTERNS=(
            "rudderstack/resource_destination.go"
            "rudderstack/resource_source.go"
            "rudderstack/client.go"
            "rudderstack/provider.go"
            "rudderstack/configs/"
            "rudderstack/integrations/destinations/common_config_meta.go"
            "internal/testutil/acc/"
          )

          RUN_ALL=false
          for pattern in "${CORE_PATTERNS[@]}"; do
            if echo "$CHANGED_FILES" | grep -q "$pattern"; then
              RUN_ALL=true
              break
            fi
          done

          if [ "$RUN_ALL" = true ]; then
            DESTINATIONS=$(find rudderstack/integrations/destinations -name 'destination_*_test.go' \
              | xargs grep -l 'TestAccDestination' 2>/dev/null \
              | sed 's|.*/destination_||; s|_test\.go||' \
              | sort -u \
              | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            DESTINATIONS=$(echo "$CHANGED_FILES" \
              | grep -oP 'rudderstack/integrations/destinations/destination_\K[a-z0-9_]+' \
              | sed 's/_test$//' \
              | sed 's/_acc_test$//' \
              | sort -u \
              | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi

          if [ "$DESTINATIONS" = "[]" ] || [ "$DESTINATIONS" = '[""]' ] || [ -z "$DESTINATIONS" ]; then
            echo "has_affected=false" >> "$GITHUB_OUTPUT"
            echo "affected=[]" >> "$GITHUB_OUTPUT"
          else
            echo "has_affected=true" >> "$GITHUB_OUTPUT"
            echo "affected=$DESTINATIONS" >> "$GITHUB_OUTPUT"
          fi

          # Source detection: run all source tests if sources/ or core files changed
          if [ "$RUN_ALL" = true ] || echo "$CHANGED_FILES" | grep -q "rudderstack/integrations/sources/"; then
            echo "has_affected_sources=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_affected_sources=false" >> "$GITHUB_OUTPUT"
          fi

          # Connection detection: run all connection tests if connections/ or core files changed
          if [ "$RUN_ALL" = true ] || echo "$CHANGED_FILES" | grep -q "rudderstack/integrations/connections/"; then
            echo "has_affected_connections=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_affected_connections=false" >> "$GITHUB_OUTPUT"
          fi

          echo "Run all: $RUN_ALL"
          echo "Affected destinations: $DESTINATIONS"

  plan-only:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run plan-only validation
        env:
          TF_ACC: "1"
          TF_ACC_PLAN_ONLY: "1"
        run: go test ./rudderstack/integrations/... -run "TestAcc" -timeout 5m -count=1

  e2e-crud:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_affected == 'true'
    runs-on: ubuntu-latest
    environment: e2e
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        destination: ${{ fromJSON(needs.detect-changes.outputs.affected) }}
    timeout-minutes: 15
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run E2E CRUD test
        env:
          TF_ACC: "1"
          RUDDERSTACK_ACCESS_TOKEN: ${{ secrets.RUDDERSTACK_ACC_TEST_TOKEN }}
          RUDDERSTACK_API_URL: ${{ secrets.RUDDERSTACK_ACC_TEST_API_URL }}
          DEST_NAME: ${{ matrix.destination }}
        run: |
          DEST_PATTERN=$(echo "$DEST_NAME" | sed 's/_/.*/g')
          go test \
            ./rudderstack/integrations/destinations/ \
            -v \
            -run "(?i)TestAccDestination.*${DEST_PATTERN}" \
            -timeout 10m \
            -count=1

  e2e-source-crud:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_affected_sources == 'true'
    runs-on: ubuntu-latest
    environment: e2e
    timeout-minutes: 15
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run E2E source CRUD tests
        env:
          TF_ACC: "1"
          RUDDERSTACK_ACCESS_TOKEN: ${{ secrets.RUDDERSTACK_ACC_TEST_TOKEN }}
          RUDDERSTACK_API_URL: ${{ secrets.RUDDERSTACK_ACC_TEST_API_URL }}
        run: |
          go test \
            ./rudderstack/integrations/sources/ \
            -v \
            -run "TestAccSource" \
            -timeout 10m \
            -count=1

  e2e-conn-crud:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_affected_connections == 'true'
    runs-on: ubuntu-latest
    environment: e2e
    timeout-minutes: 15
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run E2E connection CRUD tests
        env:
          TF_ACC: "1"
          RUDDERSTACK_ACCESS_TOKEN: ${{ secrets.RUDDERSTACK_ACC_TEST_TOKEN }}
          RUDDERSTACK_API_URL: ${{ secrets.RUDDERSTACK_ACC_TEST_API_URL }}
        run: |
          go test \
            ./rudderstack/integrations/connections/ \
            -v \
            -run "TestAccConnection" \
            -timeout 10m \
            -count=1

  e2e-summary:
    needs: [detect-changes, plan-only, e2e-crud, e2e-source-crud, e2e-conn-crud]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        env:
          PLAN_RESULT: ${{ needs.plan-only.result }}
          CRUD_RESULT: ${{ needs.e2e-crud.result }}
          SOURCE_CRUD_RESULT: ${{ needs.e2e-source-crud.result }}
          CONN_CRUD_RESULT: ${{ needs.e2e-conn-crud.result }}
          HAS_AFFECTED: ${{ needs.detect-changes.outputs.has_affected }}
          HAS_AFFECTED_SOURCES: ${{ needs.detect-changes.outputs.has_affected_sources }}
          HAS_AFFECTED_CONNECTIONS: ${{ needs.detect-changes.outputs.has_affected_connections }}
        run: |
          if [ "$PLAN_RESULT" != "success" ]; then
            echo "Plan-only validation failed."
            exit 1
          fi
          if [ "$HAS_AFFECTED" = "true" ] && [ "$CRUD_RESULT" != "success" ]; then
            echo "Some E2E destination CRUD tests failed. Check individual matrix jobs."
            exit 1
          fi
          if [ "$HAS_AFFECTED_SOURCES" = "true" ] && [ "$SOURCE_CRUD_RESULT" != "success" ]; then
            echo "E2E source CRUD tests failed."
            exit 1
          fi
          if [ "$HAS_AFFECTED_CONNECTIONS" = "true" ] && [ "$CONN_CRUD_RESULT" != "success" ]; then
            echo "E2E connection CRUD tests failed."
            exit 1
          fi
          echo "All E2E tests passed."
