# This GitHub action publishes provider assets when a GitHub Release for a
# v* tag is published. release-please creates the release and tag.
#
# This uses an action (hashicorp/ghaction-import-gpg) that assumes you set your 
# private key in the `GPG_PRIVATE_KEY` secret and passphrase in the `PASSPHRASE`
# secret. If you would rather own your own GPG handling, please fork this action
# or use an alternative one for key handling.
#
# You will need to pass the `--batch` flag to `gpg` in your signing step 
# in `goreleaser` to indicate this is being used in a non-interactive mode.
#
name: release

permissions:
  contents: write  # Required to create releases and upload assets
  id-token: write  # Required for OIDC token generation if needed by GoReleaser

on:
  # release-please publishes the GitHub release; GoReleaser then appends the
  # build artifacts to it. Triggering on `release: published` (instead of the
  # tag push) guarantees the release exists before GoReleaser runs.
  release:
    types: [published]
jobs:
  goreleaser:
    runs-on: ubuntu-latest
    # `release: published` fires for every release in the repo; restrict the
    # job to provider releases (v* tags), matching the previous `tags: v*` scope.
    if: startsWith(github.event.release.tag_name, 'v')
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      -
        name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      -
        name: Unshallow
        run: git fetch --prune --unshallow
      -
        name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: false
      -
        name: Import GPG key
        id: import_gpg
        uses: ./.github/actions/import-gpg
        env:
          # These secrets will need to be configured for the repository:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          PASSPHRASE: ${{ secrets.PASSPHRASE }}
      -
        name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: "~> v2.14"
          args: release --clean
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          # GitHub sets this automatically
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
